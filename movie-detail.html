<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMate - Movie Details</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🎬 CineMate</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="movie.html">Movies</a></li>
                <li><a href="tvshows.html">TV Shows</a></li>
                <li><a href="favourites.html">Favourites</a></li>
            </ul>
            <div class="auth-buttons" id="authButtons">
                <button class="btn-login" onclick="openAuthModal('login')">Login</button>
                <button class="btn-signup" onclick="openAuthModal('signup')">Sign Up</button>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <span id="userName"></span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="movie-detail-section">
        <div class="container">
            <div id="movieDetailContainer" class="movie-detail-container"></div>
            <div class="similar-section">
                <h2 class="section-title">🎬 You Might Also Like</h2>
                <div id="similarGrid" class="movie-grid"></div>
            </div>
        </div>
    </div>

    <div id="trailerModal" class="modal">
        <div class="modal-content trailer-modal">
            <span class="close-modal" onclick="closeTrailerModal()">&times;</span>
            <div class="trailer-container">
                <iframe id="trailerIframe" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>CineMate - Global Cinema Hub</p>
    </footer>

    <div id="toast" class="toast"></div>
    <script src="js/app.js"></script>
</body>
</html>
