<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMate - Favourites</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🎬 CineMate</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="movie.html">Movies</a></li>
                <li><a href="tvshows.html">TV Shows</a></li>
                <li><a href="favourites.html" class="active">Favourites</a></li>
            </ul>
            <div class="auth-buttons" id="authButtons">
                <button class="btn-login" onclick="openAuthModal('login')">Login</button>
                <button class="btn-signup" onclick="openAuthModal('signup')">Sign Up</button>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <span id="userName"></span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <h1>❤️ Your Favourites</h1>
        <p>Movies and shows you've saved</p>
    </div>

    <div class="filters">
        <div class="filters-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="favSearch" placeholder="Search favourites...">
            </div>
            <select id="favType" class="filter-select">
                <option value="all">All</option>
                <option value="movie">Movies Only</option>
                <option value="tv">TV Shows Only</option>
            </select>
        </div>
    </div>

    <div class="content-section">
        <div class="container">
            <div id="favouritesGrid" class="movie-grid"></div>
        </div>
    </div>

    <footer class="footer">
        <p>CineMate - Global Cinema Hub</p>
    </footer>

    <div id="toast" class="toast"></div>
    <script src="js/app.js"></script>
</body>
</html>
