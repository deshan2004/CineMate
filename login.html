<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMate - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Video Background Styles */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        
        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: -1;
        }
        
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        
        .auth-card {
            background: rgba(44, 62, 80, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        
        .auth-logo {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }
        
        .auth-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: white;
        }
        
        .input-group {
            margin-bottom: 1.5rem;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(52, 73, 94, 0.9);
            border: 2px solid transparent;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
        }
        
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .social-login {
            margin-top: 2rem;
            text-align: center;
        }
        
        .social-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .social-btn {
            flex: 1;
            padding: 0.8rem;
            background: rgba(52, 73, 94, 0.9);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.3s;
        }
        
        .social-btn:hover {
            background: var(--primary);
        }
        
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        
        .divider span {
            background: rgba(44, 62, 80, 0.95);
            padding: 0 1rem;
            position: relative;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .error-message {
            background: rgba(255, 107, 107, 0.2);
            border-left: 4px solid #ff6b6b;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .demo-credentials {
            background: rgba(16, 172, 132, 0.15);
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            text-align: center;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-film-reel-with-popcorn-and-clapperboard-32884-large.mp4" type="video/mp4">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-cinematic-theatre-curtains-32939-large.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">🎬 CineMate</div>
            <h1 class="auth-title">Welcome Back!</h1>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" value="demo@cinemate.com" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" value="demo123" required>
                </div>
                <button type="submit" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Login to CineMate</button>
            </form>
            
            <div class="demo-credentials">
                <i class="fas fa-info-circle"></i> Demo Account<br>
                <strong>Email:</strong> demo@cinemate.com | <strong>Password:</strong> demo123
            </div>
            
            <div class="divider">
                <span>OR</span>
            </div>
            
            <div class="social-login">
                <div class="social-buttons">
                    <button class="social-btn" onclick="socialLogin('google')"><i class="fab fa-google"></i> Google</button>
                    <button class="social-btn" onclick="socialLogin('facebook')"><i class="fab fa-facebook-f"></i> Facebook</button>
                </div>
            </div>
            
            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up Now</a><br>
                <a href="index.html" style="font-size: 0.8rem;">← Back to Home</a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;
            
            let users = JSON.parse(localStorage.getItem("cinemate_users") || "[]");
            
            if (users.length === 0 && email === "demo@cinemate.com" && password === "demo123") {
                const demoUser = { id: 999, name: "Demo User", email: "demo@cinemate.com", password: "demo123" };
                users.push(demoUser);
                localStorage.setItem("cinemate_users", JSON.stringify(users));
                localStorage.setItem("cinemate_currentUser", JSON.stringify(demoUser));
                showToast("Login successful! Redirecting...", "success");
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
                return;
            }
            
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem("cinemate_currentUser", JSON.stringify(user));
                showToast(`Welcome back, ${user.name}!`, "success");
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
            } else {
                const errorDiv = document.getElementById("errorMessage");
                errorDiv.innerHTML = "<i class='fas fa-exclamation-triangle'></i> Invalid email or password. Please try again.";
                errorDiv.style.display = "block";
                setTimeout(() => { errorDiv.style.display = "none"; }, 3000);
            }
        }
        
        function socialLogin(provider) {
            showToast(`${provider} login coming soon! Use demo account.`, "info");
        }
        
        const currentUser = localStorage.getItem("cinemate_currentUser");
        if (currentUser) {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
