<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMate - Movies</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🎬 CineMate</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="movie.html" class="active">Movies</a></li>
                <li><a href="tvshows.html">TV Shows</a></li>
                <li><a href="favourites.html">Favourites</a></li>
            </ul>
            <div class="auth-buttons" id="authButtons">
                <button class="btn-login" onclick="openAuthModal('login')">Login</button>
                <button class="btn-signup" onclick="openAuthModal('signup')">Sign Up</button>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <span id="userName"></span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <h1>🎬 All Movies</h1>
        <p>Discover 50+ movies from around the world</p>
    </div>

    <div class="filters">
        <div class="filters-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="movieSearch" placeholder="Search movies...">
            </div>
            <select id="movieLanguage" class="filter-select">
                <option value="all">All Languages</option>
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
                <option value="Korean">Korean</option>
                <option value="Japanese">Japanese</option>
                <option value="French">French</option>
                <option value="Tamil">Tamil</option>
                <option value="Telugu">Telugu</option>
            </select>
            <select id="movieGenre" class="filter-select">
                <option value="all">All Genres</option>
                <option value="Action">Action</option>
                <option value="Drama">Drama</option>
                <option value="Comedy">Comedy</option>
                <option value="Thriller">Thriller</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Romance">Romance</option>
            </select>
        </div>
    </div>

    <div class="category-filters">
        <button class="category-btn active" data-cat="all">All</button>
        <button class="category-btn" data-cat="Action">Action</button>
        <button class="category-btn" data-cat="Drama">Drama</button>
        <button class="category-btn" data-cat="Comedy">Comedy</button>
        <button class="category-btn" data-cat="Thriller">Thriller</button>
        <button class="category-btn" data-cat="Sci-Fi">Sci-Fi</button>
    </div>

    <div class="content-section">
        <div class="container">
            <div id="moviesGrid" class="movie-grid"></div>
        </div>
    </div>

    <footer class="footer">
        <p>CineMate - Global Cinema Hub</p>
    </footer>

    <div id="toast" class="toast"></div>
    <script src="js/app.js"></script>
</body>
</html>
